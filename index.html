<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
:root{
  --bg:#FFF3F8;
  --card:#FFFFFF;
  --pink:#FF7BAC;
  --pink-deep:#E85D95;
  --pink-soft:#FFD9E8;
  --berry:#B03A73;
  --plum:#5C2A45;
  --plum-soft:#9C6B85;
  --lavender:#C9A7F5;
  --lavender-soft:#EFE4FF;
  --gold:#F7C948;
  --gold-deep:#E0A822;
  --mint:#3FBF9B;
  --mint-soft:#DDF6EE;
  --shadow:0 10px 30px rgba(232,93,149,.18);
  --radius:22px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 12% 8%, #FFE4F0 0, transparent 30%),
    radial-gradient(circle at 88% 20%, #F1E6FF 0, transparent 32%),
    radial-gradient(circle at 50% 95%, #FFE9F3 0, transparent 40%);
  background-attachment:fixed;
  color:var(--plum);
  font-family:'Nunito',system-ui,sans-serif;
  font-size:16px;
}
#root{max-width:520px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 22px) 18px calc(env(safe-area-inset-bottom) + 40px)}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
input{font-family:inherit;font-size:16px}
h1,h2,.display{font-family:'Baloo 2',cursive}

/* header */
.kicker{font-size:12px;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--berry);display:flex;align-items:center;gap:7px}
.kicker svg{flex:0 0 auto}
.title{font-size:40px;font-weight:800;line-height:1.05;color:var(--plum);margin-top:2px}

/* treasury card */
.treasury{
  position:relative;margin-top:18px;border-radius:28px;overflow:hidden;
  background:linear-gradient(135deg,#FFB7D5 0%,#FF9EC4 42%,#D7B2F5 100%);
  box-shadow:var(--shadow);
  padding:26px 24px 28px;color:#fff;
}
.treasury .label{font-size:12px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;opacity:.95;display:flex;align-items:center;gap:6px}
.balance{font-family:'Baloo 2',cursive;font-weight:800;font-size:56px;line-height:1.1;margin-top:6px;text-shadow:0 2px 0 rgba(176,58,115,.25);transition:transform .25s}
.balance.pop{animation:pop .5s ease}
@keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.12)}100%{transform:scale(1)}}
.savepill{
  position:absolute;top:16px;right:16px;font-size:11px;font-weight:800;letter-spacing:.08em;
  background:rgba(255,255,255,.28);backdrop-filter:blur(4px);border-radius:99px;padding:5px 11px;
  display:flex;align-items:center;gap:5px;transition:opacity .4s;
}
.sub{font-size:13px;font-weight:700;opacity:.92;margin-top:8px}

/* floating sparkles */
.spark{position:absolute;color:rgba(255,255,255,.85);animation:floaty 5s ease-in-out infinite;pointer-events:none}
@keyframes floaty{0%,100%{transform:translateY(0) scale(1);opacity:.8}50%{transform:translateY(-9px) scale(1.15);opacity:1}}

/* coin burst */
.coin{
  position:absolute;top:-30px;width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%,#FFE59A,var(--gold) 55%,var(--gold-deep));
  border:2px solid var(--gold-deep);
  animation:coindrop .95s cubic-bezier(.3,.6,.4,1) forwards;pointer-events:none;
}
@keyframes coindrop{
  0%{transform:translateY(0) rotate(0);opacity:0}
  15%{opacity:1}
  85%{opacity:1}
  100%{transform:translateY(150px) rotate(320deg);opacity:0}
}

/* action buttons */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.btn{
  border-radius:var(--radius);padding:16px 14px;font-weight:800;font-size:15.5px;
  display:flex;align-items:center;gap:10px;justify-content:center;
  transition:transform .12s, box-shadow .12s;box-shadow:0 6px 16px rgba(176,58,115,.12);
}
.btn:active{transform:scale(.96)}
.btn.walk{grid-column:1/-1;background:linear-gradient(120deg,var(--pink) 0%,var(--pink-deep) 100%);color:#fff;font-size:17px;padding:18px}
.btn.prize{background:var(--card);color:var(--berry)}
.btn.deposit{background:var(--card);color:#7A4FB5}
.btn.treat{grid-column:1/-1;background:var(--lavender-soft);color:#7A4FB5;border:2px dashed var(--lavender)}

/* tabs */
.tabs{display:flex;gap:8px;margin-top:26px;background:#FBE3EE;border-radius:99px;padding:5px}
.tab{flex:1;border-radius:99px;padding:10px;font-weight:800;font-size:14px;color:var(--plum-soft);display:flex;align-items:center;justify-content:center;gap:7px}
.tab.on{background:#fff;color:var(--berry);box-shadow:0 3px 10px rgba(176,58,115,.15)}

/* lists */
.list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.row{
  background:var(--card);border-radius:18px;padding:13px 14px;display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 14px rgba(176,58,115,.08);
}
.row .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ic.earn{background:var(--mint-soft);color:var(--mint)}
.ic.gift{background:var(--lavender-soft);color:#7A4FB5}
.ic.spend{background:var(--pink-soft);color:var(--pink-deep)}
.row .body{flex:1;min-width:0}
.row .name{font-weight:800;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .when{font-size:12.5px;color:var(--plum-soft);font-weight:600;margin-top:1px}
.amt{font-family:'Baloo 2',cursive;font-weight:800;font-size:18px}
.amt.plus{color:var(--mint)}
.amt.minus{color:var(--pink-deep)}
.del{color:#D9B3C6;padding:6px;border-radius:10px}
.del:active{background:#FBE3EE;color:var(--berry)}

/* treasure chest */
.chest{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.trophy{
  background:var(--card);border-radius:20px;padding:16px 14px;box-shadow:0 4px 14px rgba(176,58,115,.08);
  display:flex;flex-direction:column;gap:8px;
}
.trophy .tic{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#FFE0EE,#EFE0FF);display:flex;align-items:center;justify-content:center;color:var(--berry)}
.trophy .tname{font-weight:800;font-size:15px;line-height:1.25}
.trophy .tprice{font-family:'Baloo 2',cursive;font-weight:800;color:var(--berry);font-size:17px}
.trophy .twhen{font-size:12px;color:var(--plum-soft);font-weight:600}

.empty{
  margin-top:22px;text-align:center;padding:34px 20px;border-radius:24px;
  border:2px dashed #F3C4DA;color:var(--plum-soft);font-weight:700;
}
.empty .display{color:var(--berry);font-size:19px;margin-top:10px}
.empty p{font-size:14px;margin-top:5px}

/* bottom sheet */
.scrim{position:fixed;inset:0;background:rgba(92,42,69,.4);backdrop-filter:blur(2px);z-index:40;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-radius:28px 28px 0 0;
  max-width:520px;margin:0 auto;padding:22px 22px calc(env(safe-area-inset-bottom) + 26px);
  animation:up .28s cubic-bezier(.2,.8,.3,1);box-shadow:0 -12px 40px rgba(176,58,115,.25);
}
@keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet h2{font-size:24px;color:var(--plum);display:flex;align-items:center;gap:9px}
.sheet .hint{font-size:13.5px;font-weight:600;color:var(--plum-soft);margin-top:3px}
.field{margin-top:16px}
.field label{display:block;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--berry);margin-bottom:7px}
.field input{
  width:100%;border:2px solid #F3D3E2;border-radius:16px;padding:13px 15px;font-weight:700;color:var(--plum);
  background:#FFF9FC;outline:none;
}
.field input:focus{border-color:var(--pink)}
.sheetbtns{display:flex;gap:10px;margin-top:22px}
.sheetbtns .go{flex:1;background:linear-gradient(120deg,var(--pink),var(--pink-deep));color:#fff;border-radius:16px;padding:15px;font-weight:800;font-size:16px}
.sheetbtns .go:disabled{opacity:.45}
.sheetbtns .no{background:#F6E4ED;color:var(--berry);border-radius:16px;padding:15px 20px;font-weight:800}
.warn{margin-top:12px;background:#FFF0E3;color:#B4652A;border-radius:14px;padding:11px 13px;font-size:13.5px;font-weight:700}

/* setup + loading */
.center{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px}
.center code{background:#FBE3EE;border-radius:8px;padding:2px 8px;color:var(--berry);font-size:14px}
.spin{animation:spin 1.6s linear infinite;color:var(--pink)}
@keyframes spin{to{transform:rotate(360deg)}}

@media (prefers-reduced-motion: reduce){
  .spark,.coin,.balance.pop{animation:none}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
/* ================================================================
   PASTE YOUR TWO SUPABASE VALUES BETWEEN THE QUOTES BELOW
   (Supabase dashboard -> Project Settings -> API)
   ================================================================ */
const SUPABASE_URL = "https://scfqlbgegsedhklxbscq.supabase.co";       // e.g. https://abcdefgh.supabase.co
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjZnFsYmdlZ3NlZGhrbHhic2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTY2MTgsImV4cCI6MjA5ODU3MjYxOH0.dGDgpuiZGkK3ryiumRXxgScxtCkSG9gq-f6kh3tU0ZM";  // the long "anon public" key
/* ================================================================ */

const {useState, useEffect, useRef, useCallback} = React;
const TABLE = "ponchi_fund";
const ROW_ID = "ponchi";
const WALK_AMOUNT = 5;

/* ---------- icons (inline, lucide-style) ---------- */
const I = ({d, size=20, sw=2.2, fill="none", children}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{children || <path d={d}/>}</svg>
);
const IcCrown = (p) => <I {...p}><path d="M3 8l4.5 4L12 5l4.5 7L21 8l-1.6 10.2a1 1 0 0 1-1 .8H5.6a1 1 0 0 1-1-.8L3 8z"/></I>;
const IcSparkle = (p) => <I {...p}><path d="M12 3l1.9 5.4L19 10l-5.1 1.6L12 17l-1.9-5.4L5 10l5.1-1.6L12 3z"/><path d="M19 15.5l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8.8-2z"/></I>;
const IcWalk = (p) => <I {...p}><circle cx="13" cy="4.5" r="1.6"/><path d="M12.5 8.5 10 12l2.5 3v5"/><path d="M10 12l-2.5 1.5L6 17"/><path d="M12.5 8.5l3 1.5 2.5-.5"/><path d="M12.5 15l3 2 1 4"/></I>;
const IcGift = (p) => <I {...p}><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M5 12v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-8"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5"/></I>;
const IcBag = (p) => <I {...p}><path d="M6 7h12l1.5 13.5a1 1 0 0 1-1 1.1H5.5a1 1 0 0 1-1-1.1L6 7z"/><path d="M9 10V6a3 3 0 0 1 6 0v4"/></I>;
const IcCoins = (p) => <I {...p}><circle cx="9" cy="9" r="6"/><path d="M14.8 6.3A6 6 0 1 1 17.7 14.8"/><path d="M7 9h4M9 7v4"/></I>;
const IcTrash = (p) => <I {...p}><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M6 6l1 14a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-14"/><path d="M10 11v6M14 11v6"/></I>;
const IcList = (p) => <I {...p}><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></I>;
const IcCheck = (p) => <I {...p}><path d="M20 6L9 17l-5-5"/></I>;
const IcHeart = (p) => <I {...p}><path d="M19.5 12.6L12 20l-7.5-7.4a5 5 0 1 1 7.5-6.6 5 5 0 1 1 7.5 6.6z"/></I>;

/* ---------- supabase helpers ---------- */
const configured = SUPABASE_URL.startsWith("https://") && SUPABASE_ANON_KEY.length > 20;
const sbHeaders = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json",
};
async function sbLoad(){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}&select=data`, {headers: sbHeaders});
  if(!r.ok) throw new Error("load " + r.status);
  const rows = await r.json();
  return rows.length ? rows[0].data : null;
}
async function sbSave(data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: "POST",
    headers: {...sbHeaders, "Prefer": "resolution=merge-duplicates"},
    body: JSON.stringify([{id: ROW_ID, data, updated_at: new Date().toISOString()}]),
  });
  if(!r.ok) throw new Error("save " + r.status);
}

/* ---------- utils ---------- */
const fmt = (n) => {
  const v = Math.round(n * 100) / 100;
  const opts = Number.isInteger(v) ? {} : {minimumFractionDigits: 2, maximumFractionDigits: 2};
  return "$" + v.toLocaleString("en-US", opts);
};
const when = (iso) => {
  const d = new Date(iso);
  const today = new Date();
  const same = d.toDateString() === today.toDateString();
  const yest = new Date(today - 864e5).toDateString() === d.toDateString();
  const t = d.toLocaleTimeString("en-US", {hour: "numeric", minute: "2-digit"});
  if (same) return "Today · " + t;
  if (yest) return "Yesterday · " + t;
  return d.toLocaleDateString("en-US", {month: "short", day: "numeric"}) + " · " + t;
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const EMPTY = {tx: []};

/* count-up hook */
function useCountUp(value){
  const [shown, setShown] = useState(value);
  const prev = useRef(value);
  useEffect(() => {
    const from = prev.current, to = value;
    prev.current = value;
    if (from === to) return;
    const t0 = performance.now(), dur = 600;
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      setShown(from + (to - from) * e);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return shown;
}

/* ---------- bottom sheet ---------- */
function Sheet({title, icon, hint, children, onClose}){
  return (
    <div>
      <div className="scrim" onClick={onClose}/>
      <div className="sheet">
        <h2 className="display">{icon} {title}</h2>
        {hint && <div className="hint">{hint}</div>}
        {children}
      </div>
    </div>
  );
}

/* ---------- main app ---------- */
function App(){
  const [state, setState] = useState(null);       // {tx:[...]}
  const [save, setSave] = useState("idle");       // idle | saving | saved | error
  const [tab, setTab] = useState("activity");
  const [sheet, setSheet] = useState(null);       // prize | deposit | treat
  const [burst, setBurst] = useState(0);
  const [pop, setPop] = useState(0);
  const dirty = useRef(false);
  const timer = useRef(null);
  const stateRef = useRef(null);
  stateRef.current = state;

  /* load: cache first, then network */
  useEffect(() => {
    try {
      const c = localStorage.getItem("ponchi-cache");
      if (c) setState(JSON.parse(c));
    } catch(e){}
    if (!configured) return;
    sbLoad().then(d => setState(d || EMPTY)).catch(() => {
      setState(s => s || EMPTY);
      setSave("error");
    });
  }, []);

  /* debounced save */
  const queueSave = useCallback(() => {
    dirty.current = true;
    setSave("saving");
    clearTimeout(timer.current);
    timer.current = setTimeout(flush, 800);
  }, []);
  const flush = useCallback(() => {
    if (!dirty.current || !stateRef.current) return;
    dirty.current = false;
    try { localStorage.setItem("ponchi-cache", JSON.stringify(stateRef.current)); } catch(e){}
    if (!configured) { setSave("saved"); return; }
    sbSave(stateRef.current).then(() => setSave("saved")).catch(() => { dirty.current = true; setSave("error"); });
  }, []);
  useEffect(() => {
    const h = () => { if (document.visibilityState === "hidden") { clearTimeout(timer.current); flush(); } };
    document.addEventListener("visibilitychange", h);
    return () => document.removeEventListener("visibilitychange", h);
  }, [flush]);

  const balance = state ? state.tx.reduce((s, t) => s + t.amount, 0) : 0;
  const shownBalance = useCountUp(balance);

  const addTx = (kind, label, amount) => {
    setState(s => ({...s, tx: [{id: uid(), kind, label, amount, date: new Date().toISOString()}, ...s.tx]}));
    queueSave();
    if (amount > 0) setBurst(Date.now());
    setPop(Date.now());
  };
  const delTx = (id) => {
    const t = state.tx.find(x => x.id === id);
    if (!confirm(`Remove "${t.label}" (${fmt(Math.abs(t.amount))})?`)) return;
    setState(s => ({...s, tx: s.tx.filter(x => x.id !== id)}));
    queueSave();
    setPop(Date.now());
  };

  const treasures = state ? state.tx.filter(t => t.kind === "treat") : [];

  if (!configured) return (
    <div className="center">
      <IcCrown size={44} sw={1.8}/>
      <h1 className="display" style={{fontSize: 30, color: "var(--berry)"}}>Almost ready!</h1>
      <p style={{fontWeight: 700, color: "var(--plum-soft)", maxWidth: 340}}>
        Open <code>index.html</code> and paste your Supabase URL and anon key near the top
        (look for <code>PASTE YOUR TWO SUPABASE VALUES</code>), then re-upload the file.
      </p>
    </div>
  );
  if (!state) return (
    <div className="center">
      <span className="spin"><IcSparkle size={40} sw={1.8}/></span>
      <p style={{fontWeight: 800, color: "var(--berry)"}}>Opening the royal treasury…</p>
    </div>
  );

  const coins = burst ? Array.from({length: 7}, (_, i) => (
    <div key={burst + "-" + i} className="coin"
         style={{left: (12 + i * 12.5) + "%", animationDelay: (i * 60) + "ms"}}/>
  )) : null;

  return (
    <div>
      <div className="kicker"><IcCrown size={15} sw={2.6}/> Princess Ponchi</div>
      <h1 className="title">Prize Fund</h1>

      <div className="treasury">
        <span className="spark" style={{top: 18, left: 20, animationDelay: "0s"}}><IcSparkle size={16}/></span>
        <span className="spark" style={{top: 60, right: 34, animationDelay: "1.2s"}}><IcSparkle size={22}/></span>
        <span className="spark" style={{bottom: 22, left: 46, animationDelay: "2.1s"}}><IcSparkle size={13}/></span>
        <span className="spark" style={{bottom: 40, right: 90, animationDelay: "3s"}}><IcSparkle size={17}/></span>
        {coins}
        <div className="savepill" style={{opacity: save === "idle" ? 0 : 1}}>
          {save === "saving" && "Saving…"}
          {save === "saved" && (<React.Fragment><IcCheck size={12} sw={3}/> Saved</React.Fragment>)}
          {save === "error" && "Offline — will retry"}
        </div>
        <div className="label"><IcCoins size={15}/> Royal treasury</div>
        <div key={pop} className={"balance" + (pop ? " pop" : "")}>{fmt(shownBalance)}</div>
        <div className="sub">{state.tx.length === 0 ? "The vault awaits its first coins" : state.tx.length + " royal transactions"}</div>
      </div>

      <div className="actions">
        <button className="btn walk" onClick={() => addTx("walk", "Lunch walk", WALK_AMOUNT)}>
          <IcWalk size={22}/> Lunch walk · +{fmt(WALK_AMOUNT)}
        </button>
        <button className="btn prize" onClick={() => setSheet("prize")}><IcSparkle size={19}/> Add a prize</button>
        <button className="btn deposit" onClick={() => setSheet("deposit")}><IcGift size={19}/> Royal deposit</button>
        <button className="btn treat" onClick={() => setSheet("treat")}><IcBag size={19}/> Treat yourself</button>
      </div>

      <div className="tabs">
        <button className={"tab" + (tab === "activity" ? " on" : "")} onClick={() => setTab("activity")}>
          <IcList size={16}/> Activity
        </button>
        <button className={"tab" + (tab === "chest" ? " on" : "")} onClick={() => setTab("chest")}>
          <IcCrown size={16}/> Treasure chest
        </button>
      </div>

      {tab === "activity" && (
        state.tx.length === 0 ? (
          <div className="empty">
            <IcSparkle size={30} sw={1.8}/>
            <div className="display">No prizes yet!</div>
            <p>Take a lunch walk to earn your first {fmt(WALK_AMOUNT)}.</p>
          </div>
        ) : (
          <div className="list">
            {state.tx.map(t => (
              <div className="row" key={t.id}>
                <div className={"ic " + (t.kind === "treat" ? "spend" : t.kind === "deposit" ? "gift" : "earn")}>
                  {t.kind === "walk" ? <IcWalk size={19}/> : t.kind === "deposit" ? <IcGift size={19}/> : t.kind === "treat" ? <IcBag size={19}/> : <IcSparkle size={19}/>}
                </div>
                <div className="body">
                  <div className="name">{t.label}</div>
                  <div className="when">{when(t.date)}</div>
                </div>
                <div className={"amt " + (t.amount >= 0 ? "plus" : "minus")}>
                  {t.amount >= 0 ? "+" : "−"}{fmt(Math.abs(t.amount))}
                </div>
                <button className="del" onClick={() => delTx(t.id)} aria-label="Remove"><IcTrash size={17}/></button>
              </div>
            ))}
          </div>
        )
      )}

      {tab === "chest" && (
        treasures.length === 0 ? (
          <div className="empty">
            <IcHeart size={30} sw={1.8}/>
            <div className="display">The chest is empty</div>
            <p>Everything you buy with prize money lives here.</p>
          </div>
        ) : (
          <div className="chest">
            {treasures.map(t => (
              <div className="trophy" key={t.id}>
                <div className="tic"><IcBag size={20}/></div>
                <div className="tname">{t.label}</div>
                <div className="tprice">{fmt(Math.abs(t.amount))}</div>
                <div className="twhen">{when(t.date)}</div>
              </div>
            ))}
          </div>
        )
      )}

      {sheet === "prize" && <PrizeSheet onClose={() => setSheet(null)} onAdd={(l, a) => { addTx("prize", l, a); setSheet(null); }}/>}
      {sheet === "deposit" && <DepositSheet onClose={() => setSheet(null)} onAdd={(l, a) => { addTx("deposit", l, a); setSheet(null); }}/>}
      {sheet === "treat" && <TreatSheet balance={balance} onClose={() => setSheet(null)} onAdd={(l, a) => { addTx("treat", l, -a); setSheet(null); setTab("chest"); }}/>}
    </div>
  );
}

function amountOk(v){ const n = parseFloat(v); return !isNaN(n) && n > 0; }

function PrizeSheet({onClose, onAdd}){
  const [label, setLabel] = useState("");
  const [amt, setAmt] = useState("");
  const ok = label.trim() && amountOk(amt);
  return (
    <Sheet title="Add a prize" icon={<IcSparkle size={22}/>} hint="Something wonderful was accomplished." onClose={onClose}>
      <div className="field">
        <label>What was earned?</label>
        <input value={label} onChange={e => setLabel(e.target.value)} placeholder="e.g. Cooked a fancy dinner" autoFocus/>
      </div>
      <div className="field">
        <label>Prize amount</label>
        <input value={amt} onChange={e => setAmt(e.target.value)} placeholder="5" inputMode="decimal"/>
      </div>
      <div className="sheetbtns">
        <button className="no" onClick={onClose}>Cancel</button>
        <button className="go" disabled={!ok} onClick={() => onAdd(label.trim(), parseFloat(amt))}>Add {amountOk(amt) ? fmt(parseFloat(amt)) : "prize"}</button>
      </div>
    </Sheet>
  );
}

function DepositSheet({onClose, onAdd}){
  const [label, setLabel] = useState("");
  const [amt, setAmt] = useState("");
  const ok = amountOk(amt);
  return (
    <Sheet title="Royal deposit" icon={<IcGift size={22}/>} hint="A gift to the treasury, no strings attached." onClose={onClose}>
      <div className="field">
        <label>Deposit amount</label>
        <input value={amt} onChange={e => setAmt(e.target.value)} placeholder="20" inputMode="decimal" autoFocus/>
      </div>
      <div className="field">
        <label>Note (optional)</label>
        <input value={label} onChange={e => setLabel(e.target.value)} placeholder="From the Royal Treasury"/>
      </div>
      <div className="sheetbtns">
        <button className="no" onClick={onClose}>Cancel</button>
        <button className="go" disabled={!ok} onClick={() => onAdd(label.trim() || "From the Royal Treasury", parseFloat(amt))}>Deposit {ok ? fmt(parseFloat(amt)) : ""}</button>
      </div>
    </Sheet>
  );
}

function TreatSheet({balance, onClose, onAdd}){
  const [label, setLabel] = useState("");
  const [amt, setAmt] = useState("");
  const n = parseFloat(amt);
  const tooMuch = amountOk(amt) && n > balance;
  const ok = label.trim() && amountOk(amt) && !tooMuch;
  return (
    <Sheet title="Treat yourself" icon={<IcBag size={22}/>} hint={"You have " + fmt(balance) + " to spend."} onClose={onClose}>
      <div className="field">
        <label>What did you get?</label>
        <input value={label} onChange={e => setLabel(e.target.value)} placeholder="e.g. Fancy candle" autoFocus/>
      </div>
      <div className="field">
        <label>Price</label>
        <input value={amt} onChange={e => setAmt(e.target.value)} placeholder="15" inputMode="decimal"/>
      </div>
      {tooMuch && <div className="warn">The treasury needs a few more coins for that one! You have {fmt(balance)}.</div>}
      <div className="sheetbtns">
        <button className="no" onClick={onClose}>Cancel</button>
        <button className="go" disabled={!ok} onClick={() => onAdd(label.trim(), n)}>Buy it {ok ? "· " + fmt(n) : ""}</button>
      </div>
    </Sheet>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
